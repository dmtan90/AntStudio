openapi: 3.0.3
info:
  title: AntFlow API
  description: API documentation for the AntFlow platform, powering video editing, streaming, and AI features.
  version: 1.0.0
servers:
  - url: /api
    description: Base API path

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [user, admin, sys-admin]
        avatar:
          type: string
        subscription:
           $ref: '#/components/schemas/Subscription'
        credits:
           $ref: '#/components/schemas/Credits'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Subscription:
      type: object
      properties:
        plan:
          type: string
          enum: [free, starter, basic, pro]
        status:
          type: string
          enum: [active, cancelled, expired]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time

    Credits:
      type: object
      properties:
        balance:
          type: number
        membership:
          type: number
        bonus:
          type: number
        weekly:
          type: number

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        mode:
          type: string
          enum: [topic, upload, avatar]
        aspectRatio:
          type: string
          enum: ['16:9', '9:16', '1:1', '4:3']
        status:
          type: string
          enum: [draft, analyzing, storyboard, generating, editing, completed, failed]
        storyboard:
          $ref: '#/components/schemas/Storyboard'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Storyboard:
      type: object
      properties:
        segments:
          type: array
          items:
            $ref: '#/components/schemas/Segment'
        totalDuration:
          type: number

    Segment:
      type: object
      properties:
        order:
          type: number
        title:
          type: string
        description:
          type: string
        duration:
          type: number
        voiceover:
          type: string
        mood:
          type: string
        style:
          type: string

    Media:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        contentType:
          type: string
        size:
          type: number
        url:
          type: string
        purpose:
          type: string
        createdAt:
          type: string
          format: date-time

paths:
  /auth/login:
    post:
      summary: Authenticate user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string

  /auth/register:
    post:
      summary: Register new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                name:
                  type: string
      responses:
        '201':
          description: User created

  /auth/me:
    get:
      summary: Get current user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /projects:
    get:
      summary: List projects
      tags: [Projects]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'

    post:
      summary: Create project
      tags: [Projects]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                mode:
                  type: string
                aspectRatio:
                  type: string
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /projects/{id}:
    get:
      summary: Get project details
      tags: [Projects]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /media/upload:
    post:
      summary: Upload media
      tags: [Media]
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'

  /ai/generate-image:
    post:
      summary: Generate image using AI
      tags: [AI]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                style:
                  type: string
                aspectRatio:
                  type: string
      responses:
        '200':
          description: Image generation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      url:
                        type: string

  /ai/generate-video:
    post:
      summary: Generate video using AI
      tags: [AI]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                duration:
                  type: number
      responses:
        '200':
          description: Video generation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      jobId:
                        type: string

  /ai/video-status/{jobId}:
    get:
      summary: Check AI video generation status
      tags: [AI]
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status of the video job

  /streaming/start:
    post:
      summary: Start a multi-platform stream
      tags: [Streaming]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                platformAccountIds:
                  type: array
                  items:
                    type: string
                projectId:
                  type: string
      responses:
        '200':
          description: Stream started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      sessionId:
                        type: string

  /streaming/stop:
    post:
      summary: Stop an active stream
      tags: [Streaming]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
      responses:
        '200':
          description: Stream stopped

  /voice/list:
    get:
      summary: List available voices (Stock & Cloned)
      tags: [Voice]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of voices
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    voice_id:
                      type: string
                    name:
                      type: string
                    category:
                      type: string
                    preview_url:
                      type: string

  /voice/clone:
    post:
      summary: Clone a new voice
      tags: [Voice]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Voice cloned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      voiceId:
                        type: string

  /analytics/overview:
    get:
      summary: Get overall statistics
      tags: [Analytics]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Overall stats overview

  /analytics/stream-health:
    get:
      summary: Get real-time stream health
      tags: [Analytics]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Real-time health metrics

  /admin/monitoring/stats:
    get:
      summary: Get system performance stats (Admin only)
      tags: [Admin, Monitoring]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: CPU, memory, and disk usage stats

  /admin/monitoring/logs:
    get:
      summary: Fetch system logs (Admin only)
      tags: [Admin, Monitoring]
      security:
        - bearerAuth: []
      parameters:
        - name: level
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paginated system logs
