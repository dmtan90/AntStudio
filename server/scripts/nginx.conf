# AntFlow Nginx Configuration Template
# Place this in /etc/nginx/sites-available/antflow and link to sites-enabled

server {
    listen 80;
    server_name yourdomain.com; # Change to your domain or server IP

    # Redirect HTTP to HTTPS (Optional but Recommended)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:4000; # Standalone engine port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fix large file uploads
        client_max_body_size 100M;
    }

    # Internal API logs
    access_log /var/log/nginx/antflow_access.log;
    error_log /var/log/nginx/antflow_error.log;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

