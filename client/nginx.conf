server {
    listen 443 ssl;
    server_name antstudio.agrhub.com;

    root /home/agrhub-gcp-key/ant-studio/client/dist;
    index index.html;

    client_max_body_size 2000M;

    ssl_certificate /etc/letsencrypt/live/antstudio.agrhub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/antstudio.agrhub.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/antstudio.agrhub.com/chain.pem;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SPA Routing: Fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/socket.io/ {
        proxy_pass http://localhost:4001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://localhost:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
